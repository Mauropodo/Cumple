<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f3d67" />
    <title>Invitación de cumpleaños</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="invitation" aria-label="Invitación de cumpleaños de Montse">
      <img class="background background--clouds" src="img/Vector-Smart-Object-(Double-Click-to-Edit)-13.png" alt="" />
      <img class="background background--texture" src="img/Vector-Smart-Object-(Double-Click-to-Edit)-12.png" alt="" />
      <img class="constellation constellation--top" src="img/Vector-Smart-Object-(Double-Click-to-Edit)-11.png" alt="" />
      <img class="constellation constellation--bottom" src="img/Vector-Smart-Object-(Double-Click-to-Edit)-9.png" alt="" />
      <img class="sparkles sparkles--top" src="img/Shape-(Double-Click-to-Edit)-9.png" alt="" />
      <img class="sparkles sparkles--bottom" src="img/Shape-(Double-Click-to-Edit)-9.png" alt="" />

      <section class="poster" aria-label="Celebración principal">
        <div class="poster-stage">
          <img class="frame" src="img/Shape-(Double-Click-to-Edit)-13.png" alt="" />
          <svg class="poster-clip-definitions" aria-hidden="true" focusable="false">
            <defs>
              <clipPath id="poster-clip" clipPathUnits="objectBoundingBox">
                <path transform="scale(0.000487804878 0.001022494888) translate(23 23) scale(0.9775609756 0.9529652352)" d="M0.5 811.5V163C132.5 152.6 165.167 50.3333 165 0.5H1885.5C1891.1 126.9 1997.17 160.833 2049.5 162V816C1923.9 819.2 1888.5 924.667 1886.5 977H165.5C165.5 863.8 55.5 819.5 0.5 811.5Z" />
              </clipPath>
            </defs>
          </svg>

          <div class="poster-clipped-content">
            <img class="cloud cloud--top-left" src="img/Vector-Smart-Object-(Double-Click-to-Edit).png" alt="" />
            <img class="cloud cloud--top-right" src="img/Vector-Smart-Object-(Double-Click-to-Edit)-2.png" alt="" />
            <img class="cloud cloud--bottom-left" src="img/Vector-Smart-Object-(Double-Click-to-Edit)-3.png" alt="" />
            <img class="cloud cloud--bottom-middle" src="img/Vector-Smart-Object-(Double-Click-to-Edit)-5.png" alt="" />
            <img class="cloud cloud--bottom-right" src="img/Vector-Smart-Object-(Double-Click-to-Edit)-4.png" alt="" />
            <img class="sun" src="img/Vector-Smart-Object-(Double-Click-to-Edit)-7.png" alt="" />
            <img class="tarot" src="img/Vector-Smart-Object-(Double-Click-to-Edit)-8.png" alt="" />
            <img class="dust dust--left" src="img/Shape-(Double-Click-to-Edit)-11.png" alt="" />
            <img class="dust dust--right" src="img/Shape-(Double-Click-to-Edit)-12.png" alt="" />

            <header class="hero-copy">
              <img class="eyebrow" src="img/Subtitle.png" alt="Hoy te invito a celebrar" />
              <img class="divider divider--hero" src="img/Shape-(Double-Click-to-Edit)-10.png" alt="" />
              <div class="birthday-title" aria-label="Mis 38 años de vida">
                <img class="title-mis" src="img/Title.png" alt="Mis" />
                <div class="title-line">
                  <img class="title-number" src="img/Title-copia.png" alt="38" />
                  <img class="title-years" src="img/Title-2.png" alt="años" />
                </div>
                <img class="title-life" src="img/Title-3.png" alt="de vida" />
              </div>
              <img class="hero-message" src="img/Body-Text.png" alt="Tu compañía es mi mejor obsequio en este día, ¡te espero!, Montse." />
            </header>
          </div>
        </div>
      </section>

      <section class="event-details" aria-label="Detalles del evento">
        <img class="detail-constellation detail-constellation--left" src="img/Vector-Smart-Object-(Double-Click-to-Edit)-11.png" alt="" />
        <img class="detail-constellation detail-constellation--right" src="img/Vector-Smart-Object-(Double-Click-to-Edit)-9.png" alt="" />
        <article class="detail detail--theme">
          <img src="img/Body-Text-2.png" alt="Cóctel para compartir místico-lúdico" />
        </article>
        <article class="detail detail--time">
          <img src="img/Time.png" alt="Cuándo: Sábado 25 de julio, 5:30 PM a 00:30 PM" />
        </article>
        <article class="detail detail--location">
          <img src="img/Location.png" alt="Dónde: Mi casa en Victoria 3098" />
        </article>
        <img class="detail-separator detail-separator--left" src="img/Shape-(Double-Click-to-Edit)-3.png" alt="" />
        <img class="detail-separator detail-separator--right" src="img/Shape-(Double-Click-to-Edit)-4.png" alt="" />
      </section>

      <footer class="contact">
        <a class="contact-link" href="https://wa.me/56974669386?text=Hola%20Monchis" target="_blank" rel="noopener noreferrer" aria-label="Escribir a Monchis por WhatsApp">
          <img class="contact-border" src="img/Shape-(Double-Click-to-Edit)-2.png" alt="" />
          <img class="contact-copy" src="img/Mail,-Web-&-Phone.png" alt="Si tienes dudas consúltame al teléfono +56 9 7466 9386" />
          <img class="contact-mobile-border" src="img/celu-footer.png" alt="" />
          <img class="contact-mobile-copy" src="img/celu-footer-txt.png" alt="Si tienes dudas consúltame al teléfono +56 9 7466 9386" />
        </a>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
